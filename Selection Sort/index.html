<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection Sort</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>
    <div class="visualizer">
        <h1>Selection Sort</h1>
        <p style="text-align: center; font-size: x-small; font-family: monospace; ">Module 4 . Selection Sort</p>
        <div class="control">
            <input type="text" placeholder="e.g. 7 , 2 , 9 , 1" id="inputValue">
            <button style="background-color: transparent; color: black; padding-left: 0px;" onclick="resetInput()" value="reset">Reset</button>
            <button class="loadArray" onclick="loadArray()">Load Array</button>
            <button class="bubbleSort" onclick="selectionSort()">Selection Sort</button>
        </div>
        <div id="barscontainer" class="bars-container"></div>
        <div id="sizeLabel" style="text-align: center; font-family: monospace; margin-top: 20px;">size: 0</div>
    </div>
</body>

</html>
