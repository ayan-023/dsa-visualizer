<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue-Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>
    <div class="queue-visualizer">
        <h1>Queue Visualizer</h1>
        <p style="text-align: center; font-size: x-small; font-family: monospace; ">Module 2 . FIFO Structure</p>
        <div class="controls">
            <input type="number" id="valueInput" placeholder="Value" />
            <button class="enqueue" onclick="enqueueValue()">Enqueue</button>
            <button class="dequeue" onclick="dequeueValue()">Dequeue</button>
        </div>
        <div id="queue-container" class="queue-container"></div>
        <div id="sizeLabel" style="text-align: center; font-family: monospace; margin-top: 40px;">size: 0</div>
    </div>
    <script src="script.js"></script>
    </div>
</body>

</html>
