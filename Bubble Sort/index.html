<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bubble Sort</title>
  <script src="script.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="visualizer">
    <h1>Bubble-Sort Visualizer</h1>
    <p style="text-align: center; font-size: x-small; font-family: monospace; ">Module 3 . Bubble Sort</p>
    <div class="controls">
      <input type="text" id="inputValue" placeholder="e.g. 7 , 2 , 9 , 1">
      <button class="loadArray" onclick="loadArray()">Load Array</button>
      <button class="bubbleSort" onclick="bubbleSort()">Bubble Sort</button>
    </div>
    <div id="barscontainer"class="bars-container"></div>
    <div id="sizeLabel" style="text-align: center; font-family: monospace; margin-top: 20px;">size: 0</div>
  </div>
</body>

</html>
