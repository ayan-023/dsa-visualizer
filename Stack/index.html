<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stack-Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>
    <div class="visualizer">
        <h1>Stack Visualizer</h1>
        <p style="text-align: center; font-size: x-small; font-family: monospace; ">Module 1 . LIFO Structure</p>
        <div class="controls">
            <input type="number" id="valueInput" placeholder="Value" />
            <button class="push" onclick="pushValue()">Push</button>
            <button class="pop" onclick="popValue()">Pop</button>
        </div>
        <div id="stackContainer" class="stack-container"></div>
        <div id="sizeLabel" style="text-align: center; font-family: monospace; margin-top: 10px;">size: 0</div>
    </div>
    <script src="script.js"></script>
    </div>
</body>

</html>
